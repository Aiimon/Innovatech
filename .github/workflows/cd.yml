name: Despliegue en AWS

on:
  push:
    branches:
      - main 

env:
  AWS_REGION: us-east-1
  CLUSTER: devops-u2-cluster
  SERVICE: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar las credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Requerido si usas AWS Academy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar IP de Backend en el Front
        run: |
          echo "VITE_API_VENTAS_URL=http://${{ secrets.AWS_EC2_IP }}:8080" > ./front_despacho/.env
          echo "VITE_API_DESPACHOS_URL=http://${{ secrets.AWS_EC2_IP }}:8081" >> ./front_despacho/.env


      # BUILD Y PUSH - BACKEND VENTAS
      - name: Build y Push imagen backend ventas
        run: |
          docker build --platform linux/amd64 \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-u2-ventas:latest \
          ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-u2-ventas:latest

      # BUILD Y PUSH - BACKEND DESPACHOS
      - name: Build y Push imagen backend despachos
        run: |
          docker build --platform linux/amd64 \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-u2-despachos:latest \
          ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-u2-despachos:latest

      # BUILD Y PUSH - FRONTEND
      - name: Build y Push imagen frontend
        run: |
          docker build --platform linux/amd64 \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-u2-frontend:latest \
          ./front_despacho
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/devops-u2-frontend:latest

      - name: Forzar un redespliegue en ECS
        run: |
          aws ecs update-service \
          --cluster ${{ env.CLUSTER }} \
          --service ${{ env.SERVICE }} \
          --force-new-deployment
